name: CI / Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID:   project-87677895-1a10-4291-8ac
  REGION:       asia-northeast1
  SERVICE_NAME: sales-daily-report-app
  REPOSITORY:   sales-daily-report

jobs:
  # ----------------------------------------------------------
  # CI — lint & test
  # ----------------------------------------------------------
  ci:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:coverage || true

  # ----------------------------------------------------------
  # Deploy — build image and roll out to Cloud Run
  # ----------------------------------------------------------
  deploy:
    name: Deploy to Cloud Run
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      # Authenticate to Google Cloud via Workload Identity Federation.
      # Prerequisites (run once in your GCP project):
      #   1. Create a Workload Identity Pool & Provider for GitHub Actions.
      #   2. Grant the service account the roles below.
      #   3. Add the following GitHub Actions secrets to this repo:
      #        GCP_WORKLOAD_IDENTITY_PROVIDER  — full provider resource name
      #        GCP_SERVICE_ACCOUNT             — service account email
      #
      # Required IAM roles for the service account:
      #   - roles/run.developer
      #   - roles/artifactregistry.writer
      #   - roles/iam.serviceAccountUser
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & push Docker image
        env:
          IMAGE: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
        run: |
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Deploy to Cloud Run
        env:
          IMAGE: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image "$IMAGE" \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --project ${{ env.PROJECT_ID }}
